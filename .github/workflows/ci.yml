name: CI

on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      # jq + git + shellcheck are preinstalled on ubuntu-latest; bats is not. Pin it exactly.
      - name: Install bats
        run: npm install -g bats@1.13.0

      - name: Shellcheck the transform core
        run: shellcheck emit-test-stats.sh

      - name: Run fixture tests (all six runner families + contract invariants + golden 584)
        run: bats tests/emit-test-stats.bats
