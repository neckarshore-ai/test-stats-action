name: CI

on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      # jq + git + shellcheck are preinstalled on ubuntu-latest; bats + ajv are not.
      # Pin both exactly. sudo: the runner's global npm prefix (/usr/local) needs root.
      - name: Install bats + ajv-cli
        run: sudo npm install -g bats@1.13.0 ajv-cli@5.0.0

      - name: Shellcheck the transform core + helpers
        run: shellcheck emit-test-stats.sh tests/validate-schema.sh

      - name: Run fixture tests (8 runner families + contract invariants + golden A/B/C + red/declared)
        run: bats tests/emit-test-stats.bats

      - name: Validate emitted stats.json against the hardened contract schema
        run: bash tests/validate-schema.sh
